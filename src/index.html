<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SquadPad</title>
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="SquadPad - Unofficial BombSquad Web Controller">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%A3%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <!-- Prevent iOS rubber-band scrolling and text selection -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body>
  <div id="app">

    <!-- Connect Screen: shown by default -->
    <div id="connect-screen">
      <div class="connect-card">
        <h1 class="brand-title">SquadPad</h1>
        <p class="brand-subtitle">Unofficial BombSquad Controller</p>

        <input
          type="text"
          id="room-code"
          placeholder="Room code (e.g. SQPD-7X3K)"
          maxlength="9"
          autocomplete="off"
          spellcheck="false"
        >
        <button id="join-btn" class="btn-primary">Join Game</button>
        <button id="demo-btn" class="btn-demo">Demo Mode</button>
        <a href="host.html" class="nav-link" id="dashboard-link">Dashboard</a>
        <div id="connection-status"></div>
      </div>
    </div>

    <!-- Controller Screen: hidden until connected or demo -->
    <div id="controller-screen" hidden>
      <header id="hud">
        <button id="menu-btn" aria-label="Menu">&#9776;</button>
        <span id="game-name">SquadPad</span>
        <span id="lag-display">--ms</span>
      </header>

      <div id="controls">
        <!-- Left: Joystick area -->
        <div id="joystick-zone">
          <div id="joystick-base">
            <div id="joystick-thumb"></div>
          </div>
          <span class="kbd-hint">WASD to move</span>
        </div>

        <!-- Right: Action buttons in diamond layout -->
        <div id="button-zone">
          <div class="btn-diamond">
            <button class="action-btn btn-throw" data-action="throw">Throw</button>
            <button class="action-btn btn-punch" data-action="punch">Punch</button>
            <button class="action-btn btn-bomb"  data-action="bomb">Bomb</button>
            <button class="action-btn btn-jump"  data-action="jump">Jump</button>
          </div>
          <button class="action-btn btn-run" data-action="run">Run</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Show dashboard link only when running inside Tauri
    if (window.__TAURI__) {
      document.body.classList.add('is-tauri');
    }
  </script>
  <script type="module" src="js/ui.js"></script>
</body>
</html>
